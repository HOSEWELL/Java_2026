version: 2.1

orbs:
  maven: circleci/maven@1.4.1

jobs:
  test-java:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - run:
          name: Run Maven Tests
          command: |
            cd java_training
            mvn test
      - run:
          name: Package JAR
          command: |
            cd java_training
            mvn package -DskipTests
      - store_test_results:
          path: java_training/target/surefire-reports

workflows:
  maven_workflow:
    jobs:
      - test-java